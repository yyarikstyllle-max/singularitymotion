<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Singularity by Motion</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Space Grotesk', sans-serif;
      background: #fff;
      color: #000;
    }
    header {
      text-align: center;
      padding: 5rem 2rem;
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: 4px;
    }
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: #fff;
      border-bottom: 1px solid #000;
      display: flex;
      justify-content: center;
      gap: 3rem;
      padding: 1rem;
      z-index: 1000;
    }
    nav a {
      text-decoration: none;
      color: #000;
      font-weight: bold;
      transition: color 0.3s ease;
    }
    nav a:hover {
      color: #555;
    }
    section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    .icon {
      width: 200px;
      height: 200px;
      background: #000;
      margin: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.2rem;
      transition: transform 0.3s ease, background 0.3s ease;
    }
    .icon:hover {
      transform: scale(1.1);
      background: #333;
    }
  </style>
</head>
<body>
  <nav>
    <a href="#services">Услуги</a>
    <a href="#about">Обо мне</a>
    <a href="#contacts">Контакты</a>
  </nav>

  <header>Singularity by Motion</header>

  <section id="services">
    <h2>Услуги</h2>
    <div class="icon">Рекламная анимация</div>
    <div class="icon">Анимация логотипов</div>
    <div class="icon">Профессиональный монтаж</div>
    <div class="icon">Анимации презентаций</div>
  </section>

  <section id="about">
    <h2>Обо мне</h2>
    <p>Здесь мы позже добавим информацию о тебе.</p>
  </section>

  <section id="contacts">
    <h2>Контакты</h2>
    <p>Напиши сюда свои контактные данные.</p>
  </section>
</body>
</html>
